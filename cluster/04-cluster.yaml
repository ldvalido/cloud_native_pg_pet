apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-lab
  namespace: postgres
spec:
  # ---------------------------------------------------------------------------
  # Topology: 1 primary + 2 replicas for HA and future read-scaling (ADR §1)
  # ---------------------------------------------------------------------------
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:17

  # ---------------------------------------------------------------------------
  # Credentials
  # ---------------------------------------------------------------------------
  superuserSecret:
    name: cnpg-superuser-secret

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: cnpg-app-secret
      # Extensions are created here so they exist in the app database.
      # pg_stat_statements: query observability (ADR §8)
      # pg_partman is NOT in the standard CNPG image — native declarative
      # partitioning (CREATE TABLE ... PARTITION BY) covers the lab use case.
      # Add pg_partman later via a custom image if needed.
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

  # ---------------------------------------------------------------------------
  # Storage: 3Gi for lab (ADR recommends 100–200 GiB for production) (ADR §2)
  # ---------------------------------------------------------------------------
  storage:
    storageClass: postgres-ssd
    size: 3Gi

  # WAL storage on a separate volume avoids contention with data I/O
  walStorage:
    storageClass: postgres-ssd
    size: 1Gi

  # ---------------------------------------------------------------------------
  # High-write PostgreSQL parameters (ADR §3)
  # ---------------------------------------------------------------------------
  postgresql:
    shared_preload_libraries:
      - pg_stat_statements
    parameters:
      # Throughput over strict durability — accept potential loss of a few ms
      synchronous_commit: "off"

      # WAL optimisation
      wal_compression: "on"
      max_wal_size: "512MB"  # must be < walStorage size (1Gi)
      min_wal_size: "64MB"

      # Checkpoint tuning
      checkpoint_timeout: "15min"
      checkpoint_completion_target: "0.9"

      # Autovacuum — keeps tables clean under heavy insert load
      autovacuum_max_workers: "5"
      autovacuum_vacuum_scale_factor: "0.05"
      autovacuum_analyze_scale_factor: "0.02"

      # pg_stat_statements — retain top 2000 queries
      pg_stat_statements.max: "2000"
      pg_stat_statements.track: "all"

      # Connection limits — conservative for lab
      max_connections: "100"

      # Logging: emit slow queries for observability (Phase 2 will ship these to VictoriaLogs)
      log_min_duration_statement: "500"
      log_checkpoints: "on"
      log_autovacuum_min_duration: "250"
      log_line_prefix: "%t [%p]: user=%u,db=%d,app=%a,client=%h "

  # ---------------------------------------------------------------------------
  # Resources: modest for lab, tune for production
  # ---------------------------------------------------------------------------
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  # ---------------------------------------------------------------------------
  # Affinity: spread instances across nodes when available
  # ---------------------------------------------------------------------------
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          cnpg.io/cluster: pg-lab

  # ---------------------------------------------------------------------------
  # Monitoring: pre-wired for VictoriaMetrics via PodMonitor (ADR §7)
  # Activate Phase 2 observability stack and this becomes live immediately.
  # ---------------------------------------------------------------------------
  monitoring:
    enablePodMonitor: true

  # ---------------------------------------------------------------------------
  # Backup: placeholder — uncomment and fill S3 credentials for production
  # (ADR §5): daily backups via Barman + WAL archiving for PITR
  # ---------------------------------------------------------------------------
  # backup:
  #   retentionPolicy: "7d"
  #   barmanObjectStore:
  #     destinationPath: s3://YOUR_BUCKET/postgres/pg-lab
  #     s3Credentials:
  #       accessKeyId:
  #         name: s3-backup-secret
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: s3-backup-secret
  #         key: SECRET_ACCESS_KEY
  #     wal:
  #       compression: gzip
  #       maxParallel: 2
  #     data:
  #       compression: gzip
  #       immediateCheckpoint: false
  #       jobs: 2
