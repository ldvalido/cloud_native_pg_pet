apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:4.8.1
          ports:
            - containerPort: 8080
          env:
            # Pre-fill the server field with the CNPG read-write service (primary)
            - name: ADMINER_DEFAULT_SERVER
              value: pg-lab-rw
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: postgres
spec:
  selector:
    app: adminer
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
